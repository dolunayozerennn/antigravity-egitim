# ═══════════════════════════════════════════════════
# 🤝 SWEATCOIN / DOLUNAY — AI Marka İş Birliği Outreach
# ═══════════════════════════════════════════════════
# Kaynak: Projeler/Instagram_İş_Birliği_Scraper/ → YAML'a dönüştürüldü
# Amaç: AI markalarına influencer olarak iş birliği teklifi göndermek
# Referans: _agents/musteri-kazanim/AGENT.md
# ═══════════════════════════════════════════════════

# --- 🏷️ KAMPANYA BİLGİLERİ ---
kampanya_adi: "sweatcoin-ai-marka-isbirligi-2026"
aciklama: "AI, tech ve dijital araç markalarına influencer iş birliği teklifi — 100M+ organik görüntülenme ile"
hedef_tip: "b2b_sirket"       # Marka/şirketlere ulaşıyoruz
durum: "draft"

# --- 🎯 HEDEF KİTLE (ICP) ---
icp:
  platform: ["instagram"]     # Instagram üzerinden marka hesaplarını buluyoruz
  bolge: "Global"
  dil: ["EN"]

  # B2B parametreleri — AI marka profili
  sirket_buyuklugu: "5-500"
  hedef_pozisyonlar:
    - "Marketing"
    - "Growth"
    - "Influencer Marketing"
    - "Partnerships"
    - "PR"
    - "Founder"
    - "CEO"
    - "Brand"
  sektor:
    - "AI"
    - "SaaS"
    - "Tech"
    - "Digital Tools"
    - "Video AI"
    - "Design AI"
    - "Coding AI"

# --- 🔍 ARAMA KRİTERLERİ ---
arama:
  anahtar_kelimeler:
    - "AI tool"
    - "artificial intelligence"
    - "AI app"
  hashtag_listesi: []
  rakip_hesaplar: []          # Gerekirse: rakip influencer'ların mention ettiği markalar
  max_lead_sayisi: 50

  # ── Özel filtreler ──
  false_positive_listesi:     # AI markası olmayan hesaplar
    - "ibrahimselim"
    - "birceakalay"
    - "hepsiburada"
  buyuk_sirket_listesi:       # Outreach yapılmayacak büyük şirketler
    - "googleturkiye"
    - "googlegemini"
    - "meta.ai"
    - "samsungturkiye"
  calisan_markalar_dosyasi: "calisan_markalar.json"  # Halihazırda iş birliği yapılan markalar

# --- 📧 OUTREACH AYARLARI ---
outreach:
  gonderen_email: ""          # ← Dolunay'ın Gmail adresi
  sablon_dili: "EN"
  sablon_dosyasi: "templates/email-en.md"
  dry_run: true

  # Kişiselleştirme bilgileri
  gonderici_adi: "Dolunay"
  ekstra_bilgi: "100M+ organic views in Turkey, collaborated with Pixelcut, Nim AI, Aithor, TopView, Creatify"

  # İletişim stratejisi: DM + Email çift kanallı
  dm_oncesi: true             # Önce DM gönder, sonra email
  dm_sablon_dosyasi: "templates/email-en.md"  # DM şablonu da template'lerde

  # Email bulma strateji sırası
  email_bulma_sirasi:
    - "brand_info_db"         # Markanın bilinen genel emaili
    - "hunter"                # Hunter.io ile domain'den kişisel email
    - "apollo"                # Apollo.io fallback

  deger_onerisi: |
    I have a viral campaign idea that could make your brand stand out.
    My content has reached 100M+ organic views in Turkey.
  cta: "If you're interested, just reply to this email. I'd love to share the details with you!"

# --- ⏱️ SEQUENCE AYARLARI ---
sequence:
  profil: "ajans"             # Yaratıcı ton, portfolio ve sonuç ağırlıklı
  toplam_adim: 3
  bekleme_suresi_acilmadi: 5
  bekleme_suresi_cevaplanmadi: 4
  gunluk_gonderim_limiti: 30
  gonderim_araligi: 5
  gonderim_saatleri: "09:00-17:00"
  gonderim_gunleri: ["Pzt", "Sal", "Car", "Per", "Cum"]
  saat_dilimi: "UTC+3"

# --- 📁 DOSYA YOLLARI ---
dosyalar:
  ham_cikti: "data/sweatcoin-ai-marka_raw.json"
  zenginlestirilmis: "data/sweatcoin-ai-marka_enriched.json"
  mesajlar: "data/sweatcoin-ai-marka_messages.json"
  log: "data/sweatcoin-ai-marka_log.csv"
  takip: "data/sweatcoin-ai-marka_takip.csv"

# --- 📋 NOTLAR ---
# Bu config, Projeler/Instagram_İş_Birliği_Scraper/ projesinden türetilmiştir.
# Orijinal proje şu mantığı kullanır:
#   1. Instagram'daki AI marka hesaplarını tespit et (ai_brands.json)
#   2. Her marka için Hunter.io → Apollo.io waterfall ile kişisel email bul
#   3. İki şablon: DM mesajı (Instagram) + Email (genel ve kişisel)
#   4. False positive filtresi + büyük şirket filtresi + halihazırda çalışılan marka filtresi
#   5. find_contacts.py ile Outreach_Listesi.csv oluştur
