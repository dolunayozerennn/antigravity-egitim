<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} - Akış</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #11151c;
            --bg-grid: #1e2430;
            --node-bg: #1a202a;
            --node-border: #2a3441;
            --text-main: #ffffff;
            --text-muted: #8b9eb5;
            
            /* Node Colors */
            --color-trigger: #ff7e67;
            --color-action: #00e5ff;
            --color-logic: #b167ff;
            --color-success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            /* n8n style dotted grid */
            background-image: radial-gradient(var(--bg-grid) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        header {
            padding: 2rem;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(17, 21, 28, 0.9) 0%, rgba(17, 21, 28, 0) 100%);
            pointer-events: none;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 32, 42, 0.8);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--node-border);
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        .controls span {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .key {
            background: var(--node-border);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .canvas {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 50vw; 
            scroll-behavior: smooth;
            cursor: grab;
        }
        
        .canvas:active {
            cursor: grabbing;
        }

        .flow-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0;
            min-width: max-content;
        }

        .node-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.9);
            filter: grayscale(1);
        }

        .node-wrapper.active {
            opacity: 1;
            transform: scale(1.05);
            filter: grayscale(0);
        }

        .node-wrapper.completed {
            opacity: 0.8;
            transform: scale(1);
            filter: grayscale(0);
        }

        .node {
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            border-radius: 8px;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Assigning dynamic colors based on node order index via CSS vars injected in JS */
        .node-wrapper.active .node {
            border-color: var(--theme-color);
            box-shadow: 0 0 25px rgba(0,0,0,0.5), inset 0 0 0 1px var(--theme-color);
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-bottom: 1px solid var(--node-border);
            background: rgba(255,255,255,0.02);
            border-radius: 8px 8px 0 0;
        }

        .node-icon-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
        }

        .node-icon {
            font-size: 1.2rem;
        }

        .node-title-container {
            display: flex;
            flex-direction: column;
        }

        .node-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0;
            color: var(--text-main);
        }
        
        .node-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 2px 0 0 0;
        }

        .node-body {
            padding: 15px;
            background: var(--node-bg);
            border-radius: 0 0 8px 8px;
        }

        .node-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .sub-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sub-step {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }

        .node-wrapper.active .sub-step.animate-in {
            opacity: 1;
            transform: translateX(0);
        }
        
        .node-wrapper.completed .sub-step {
            opacity: 1;
            transform: translateX(0);
        }

        .sub-step.processing {
            border-left-color: #f59e0b;
            color: var(--text-main);
            background: rgba(245, 158, 11, 0.1);
        }

        .sub-step.completed {
            border-left-color: var(--color-success);
            color: var(--text-main);
            background: rgba(16, 185, 129, 0.1);
        }

        .status-icon {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--node-border);
        }

        .sub-step.processing .status-dot {
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
            animation: pulse 1s infinite;
        }

        .sub-step.completed .status-dot {
            display: none;
        }
        
        .sub-step .status-check {
            display: none;
            color: var(--color-success);
            font-size: 10px;
            font-weight: bold;
        }
        
        .sub-step.completed .status-check {
            display: block;
        }

        /* SVG Connectors */
        .connector-wrapper {
            position: relative;
            width: 80px;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .connector-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .connector-path {
            fill: none;
            stroke: var(--node-border);
            stroke-width: 2;
            transition: all 0.3s ease;
        }
        
        .connector-path-active {
            fill: none;
            stroke: var(--theme-color);
            stroke-width: 3;
            stroke-dasharray: 10;
            stroke-dashoffset: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .connector-wrapper.active .connector-path-active {
            opacity: 1;
            animation: flowData 1s linear infinite;
            filter: drop-shadow(0 0 5px var(--theme-color));
        }

        @keyframes flowData {
            to { stroke-dashoffset: 0; }
        }

        /* Node Ports (n8n style input/output endpoints) */
        .node::before {
            content: '';
            position: absolute;
            left: -5px; top: 50%;
            transform: translateY(-50%);
            width: 10px; height: 10px;
            background: var(--bg-grid);
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            z-index: 2;
        }
        
        /* Disable input port for first node */
        .node-wrapper:first-child .node::before {
            display: none;
        }

        .node::after {
            content: '';
            position: absolute;
            right: -5px; top: 50%;
            transform: translateY(-50%);
            width: 10px; height: 10px;
            background: var(--bg-grid);
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            z-index: 2;
        }
        
        /* Disable output port for last node */
        .node-wrapper:last-child .node::after {
            display: none;
        }

        .node-wrapper.active .node::after,
        .node-wrapper.completed .node::after {
            border-color: var(--theme-color);
            background: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Data Packet Animation */
        .data-packet {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-main);
            box-shadow: 0 0 10px var(--text-main);
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
        }
        
        .connector-wrapper.active .data-packet {
            animation: shootPacket 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        @keyframes shootPacket {
            0% { left: 0; opacity: 0; transform: translateY(-50%) scale(0.5); }
            10% { opacity: 1; transform: translateY(-50%) scale(1); }
            90% { opacity: 1; transform: translateY(-50%) scale(1); }
            100% { left: 100%; opacity: 0; transform: translateY(-50%) scale(0.5); }
        }
    </style>
</head>
<body>
    <header>
        <h1>{{PROJECT_NAME}}</h1>
        <div class="subtitle">{{PROJECT_DESCRIPTION}}</div>
    </header>

    <div class="canvas" id="canvas">
        <div class="flow-container" id="flowContainer"></div>
    </div>

    <div class="controls">
        <span><span class="key">Space</span> veya <span class="key">→</span> ile akışı ilerlet</span>
    </div>

    <script>
        const nodesData = /*__NODES_DATA__*/[
            {
                title: 'Webhook',
                desc: 'Müşteri form doldurduğunda veri alınır.',
                icon: '⚡',
                subSteps: []
            },
            {
                title: 'Data Extraction',
                desc: 'JSON payload işlenir ve değişkenler ayrıştırılır.',
                icon: '⚙️',
                subSteps: ['Validasyon yapıldı', 'Data normalize edildi']
            },
            {
                title: 'AI Processing',
                desc: 'LLM ile veriler analiz edilir.',
                icon: '🧠',
                subSteps: ['Prompt hazırlandı', 'LLM yanıt verdi']
            },
            {
                title: 'Slack Alert',
                desc: 'Sonuç takıma bildirilir.',
                icon: '🔔',
                subSteps: ['Mesaj formatlandı', 'Kanala gönderildi']
            }
        ];/*__NODES_DATA_END__*/

        const themeColors = ['#ff7e67', '#00e5ff', '#b167ff', '#f59e0b', '#10b981', '#ec4899', '#6366f1'];
        const container = document.getElementById('flowContainer');
        const canvas = document.getElementById('canvas');
        let currentIndex = -1;

        function renderNodes() {
            container.innerHTML = '';
            nodesData.forEach((data, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'node-wrapper';
                wrapper.id = `node-${index}`;
                
                // Assign a theme color
                const color = themeColors[index % themeColors.length];
                wrapper.style.setProperty('--theme-color', color);

                let subStepsHtml = '';
                if (data.subSteps && data.subSteps.length > 0) {
                    subStepsHtml = `<div class="sub-steps">`;
                    data.subSteps.forEach((step, sIndex) => {
                        subStepsHtml += `
                            <div class="sub-step" id="substep-${index}-${sIndex}">
                                <div class="status-icon">
                                    <div class="status-dot"></div>
                                    <div class="status-check">✓</div>
                                </div>
                                <span>${step}</span>
                            </div>`;
                    });
                    subStepsHtml += `</div>`;
                }

                wrapper.innerHTML = `
                    <div class="node">
                        <div class="node-header">
                            <div class="node-icon-wrapper">
                                <span class="node-icon">${data.icon}</span>
                            </div>
                            <div class="node-title-container">
                                <h3 class="node-title">${data.title}</h3>
                                <div class="node-subtitle">Step ${index + 1}</div>
                            </div>
                        </div>
                        <div class="node-body">
                            <p class="node-desc">${data.desc}</p>
                            ${subStepsHtml}
                        </div>
                    </div>
                `;
                container.appendChild(wrapper);

                if (index < nodesData.length - 1) {
                    const nextColor = themeColors[(index + 1) % themeColors.length];
                    const connector = document.createElement('div');
                    connector.className = 'connector-wrapper';
                    connector.id = `connector-${index}`;
                    
                    // n8n style curved bezier connector
                    connector.innerHTML = `
                        <svg class="connector-svg" preserveAspectRatio="none">
                            <path class="connector-path" d="M 0 20 C 40 20, 40 20, 80 20"></path>
                            <path class="connector-path-active" d="M 0 20 C 40 20, 40 20, 80 20" style="--theme-color: ${color}"></path>
                        </svg>
                        <div class="data-packet" style="--theme-color: ${color}"></div>
                    `;
                    container.appendChild(connector);
                }
            });
            
            // Initial center
            setTimeout(() => {
                if(nodesData.length > 0) {
                    const firstNode = document.getElementById('node-0');
                    centerOnElement(firstNode);
                    setTimeout(nextNode, 300);
                }
            }, 100);
        }
        
        function centerOnElement(el) {
            const elRect = el.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            const scrollTarget = canvas.scrollLeft + (elRect.left - canvasRect.left) - (canvasRect.width / 2) + (elRect.width / 2);
            canvas.scrollTo({ left: scrollTarget, behavior: 'smooth' });
        }

        async function updateState() {
            const wrappers = document.querySelectorAll('.node-wrapper');
            const connectors = document.querySelectorAll('.connector-wrapper');

            wrappers.forEach((el, idx) => {
                el.classList.remove('active', 'completed');
                if (idx < currentIndex) {
                    el.classList.add('completed');
                    el.querySelectorAll('.sub-step').forEach(s => {
                        s.classList.add('animate-in', 'completed');
                        s.classList.remove('processing');
                    });
                } else if (idx === currentIndex) {
                    el.classList.add('active');
                    
                    centerOnElement(el);

                    const currentData = nodesData[currentIndex];
                    if (currentData.subSteps && currentData.subSteps.length > 0) {
                        animateSubSteps(currentIndex, currentData.subSteps);
                    }
                }
            });

            connectors.forEach((el, idx) => {
                el.classList.remove('active');
                if (idx < currentIndex) el.classList.add('active');
            });
        }

        async function animateSubSteps(nodeIndex, subSteps) {
            for (let i = 0; i < subSteps.length; i++) {
                if (currentIndex !== nodeIndex) return;
                const stepEl = document.getElementById(`substep-${nodeIndex}-${i}`);
                stepEl.classList.add('animate-in', 'processing');
                await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
                if (currentIndex !== nodeIndex) return;
                stepEl.classList.remove('processing');
                stepEl.classList.add('completed');
            }
        }

        function nextNode() { if (currentIndex < nodesData.length - 1) { currentIndex++; updateState(); } }
        function prevNode() { if (currentIndex > 0) { currentIndex--; updateState(); } }

        window.addEventListener('keydown', (e) => {
            if (['Space', 'ArrowRight'].includes(e.code)) { e.preventDefault(); nextNode(); }
            if (['ArrowLeft'].includes(e.code)) { e.preventDefault(); prevNode(); }
        });

        // Drag to scroll functionality
        let isDown = false; let startX; let scrollLeft;
        canvas.addEventListener('mousedown', e => { 
            isDown = true; 
            startX = e.pageX - canvas.offsetLeft; 
            scrollLeft = canvas.scrollLeft; 
            canvas.style.cursor = 'grabbing';
        });
        canvas.addEventListener('mouseleave', () => { isDown = false; canvas.style.cursor = 'grab'; });
        canvas.addEventListener('mouseup', () => { isDown = false; canvas.style.cursor = 'grab'; });
        canvas.addEventListener('mousemove', e => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - canvas.offsetLeft;
            canvas.scrollLeft = scrollLeft - (x - startX);
        });

        renderNodes();
    </script>
</body>
</html>
