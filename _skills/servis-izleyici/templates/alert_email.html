<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <div style="max-width: 600px; margin: 20px auto; background: #1e293b; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
        
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #dc2626, #b91c1c, #991b1b); padding: 32px 28px; position: relative;">
            <div style="position: absolute; top: 0; right: 0; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 0 0 0 100%; pointer-events: none;"></div>
            <h1 style="margin: 0; font-size: 22px; color: white; font-weight: 700; letter-spacing: -0.3px;">
                🚨 Railway Servis Alarmı
            </h1>
            <p style="margin: 10px 0 0; color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.5;">
                <strong>{{COUNT}} serviste</strong> sorun tespit edildi — acil müdahale gerekebilir.
            </p>
        </div>

        <!-- Servis Tablosu -->
        <div style="padding: 0 4px;">
            <table style="width: 100%; border-collapse: collapse; margin-top: 0;">
                <thead>
                    <tr>
                        <th style="padding: 14px 24px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border-bottom: 1px solid #334155;">Servis</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border-bottom: 1px solid #334155;">Durum</th>
                        <th style="padding: 14px 24px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border-bottom: 1px solid #334155;">Detay</th>
                    </tr>
                </thead>
                <tbody>
                    {{ROWS}}
                </tbody>
            </table>
        </div>

        <!-- Aksiyon Alanı -->
        <div style="padding: 24px 28px;">
            <a href="https://railway.app/dashboard" 
               style="display: inline-block; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; text-decoration: none; padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; letter-spacing: 0.3px;">
                Railway Dashboard'u Aç →
            </a>
        </div>

        <!-- Footer -->
        <div style="padding: 20px 28px; background: #0f172a; border-top: 1px solid #334155; text-align: center;">
            <p style="margin: 0; font-size: 12px; color: #475569; line-height: 1.6;">
                Kontrol zamanı: {{TIMESTAMP}}<br>
                Antigravity Servis İzleyici • Saatlik Otomatik Kontrol
            </p>
        </div>
    </div>
</body>
</html>
